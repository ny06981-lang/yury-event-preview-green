window.DossierPitchV2RU = DossierPitchV2RU;

<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<window.DossierPitchV2RU />);

  // ── Inline text editing (same engine as v1/v2, separate store key) ──
  const STORE_KEY = "dossier-edit-v2-ru:v1";
  const INLINE_PHRASING = new Set(["EM", "STRONG", "I", "B", "U", "SPAN", "BR"]);

  function loadStore() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY) || "{}"); }
    catch { return {}; }
  }
  function saveStore(obj) {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(obj)); } catch {}
  }
  function pathOf(el, root) {
    const parts = [];
    let cur = el;
    while (cur && cur !== root) {
      const p = cur.parentNode;
      if (!p) break;
      const idx = Array.prototype.indexOf.call(p.children, cur);
      parts.push(cur.tagName.toLowerCase() + ":" + idx);
      cur = p;
    }
    return parts.reverse().join("/");
  }
  function isLeafText(el) {
    let hasText = false;
    for (const n of el.childNodes) {
      if (n.nodeType === 3) {
        if (n.nodeValue && n.nodeValue.trim()) hasText = true;
      } else if (n.nodeType === 1) {
        if (!INLINE_PHRASING.has(n.tagName)) return false;
        if (!isLeafText(n) && !n.childNodes.length === 0) {
          if (n.tagName !== "BR") return false;
        }
      }
    }
    return hasText;
  }

  let flashTimer = null;
  function flashSaved() {
    const f = document.getElementById("savedFlash");
    if (!f) return;
    f.classList.add("show");
    clearTimeout(flashTimer);
    flashTimer = setTimeout(() => f.classList.remove("show"), 700);
  }

  function attachEditors() {
    const rootEl = document.getElementById("root");
    if (!rootEl) return;
    const store = loadStore();
    rootEl.querySelectorAll("*").forEach((el) => {
      if (el.dataset.editBound) return;
      if (!isLeafText(el)) return;
      if (INLINE_PHRASING.has(el.tagName)) return;
      const key = pathOf(el, rootEl);
      if (!key) return;
      if (Object.prototype.hasOwnProperty.call(store, key)) {
        el.innerHTML = store[key];
      }
      el.contentEditable = "true";
      el.spellcheck = false;
      el.dataset.edit = "1";
      el.dataset.editKey = key;
      el.dataset.editBound = "1";
      el.addEventListener("blur", () => {
        const s = loadStore();
        s[key] = el.innerHTML;
        saveStore(s);
        flashSaved();
      });
      el.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          document.execCommand("insertLineBreak");
        }
        if (e.key === "Escape") {
          e.preventDefault();
          el.blur();
        }
      });
      el.addEventListener("paste", (e) => {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData("text");
        document.execCommand("insertText", false, text);
      });
    });
  }

  requestAnimationFrame(() => requestAnimationFrame(attachEditors));
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => attachEditors());
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (!confirm("Сбросить все локальные правки этой версии? Действие необратимо.")) return;
    try { localStorage.removeItem(STORE_KEY); } catch {}
    location.reload();
  });

  // Fit-to-viewport scaling.
  function fit() {
    const frame = document.getElementById("root");
    if (!frame) return;
    const avail = window.innerWidth - 40;
    const scale = Math.min(1, avail / 1240);
    frame.style.transform = `scale(${scale})`;
    frame.style.marginBottom = `${(1 - scale) * 1754 * -1}px`;
  }
  window.addEventListener("resize", fit);
  requestAnimationFrame(fit);
</script>

</body>
